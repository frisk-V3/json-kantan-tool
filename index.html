<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Haxe JSON Generator</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .row { margin-bottom: 10px; display: flex; gap: 5px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { cursor: pointer; padding: 8px 15px; border-radius: 4px; border: none; }
        #generate-btn { background: #007bff; color: white; font-weight: bold; }
        #add-row-btn { background: #28a745; color: white; }
        .remove-btn { background: #dc3545; color: white; }
        textarea { width: 100%; height: 200px; margin-top: 20px; font-family: monospace; }
    </style>
</head>
<body>
    <h1>JSON作成ツール </h1>
    <div id="input-container"></div>
    <button id="add-row-btn">+ 項目を追加</button>
    <hr>
    <button id="generate-btn">JSONを生成</button>
    <button id="copy-btn">結果をコピー</button>
    <br>
    <textarea id="json-output" readonly placeholder="ここに生成されたJSONが表示されます"></textarea>
    
    <script src="index.js"></script>
</body>
</html>
